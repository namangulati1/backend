version: '3.8'

services:
  backend:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: naman
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: log_ai
    ports:
      - '5432:5432'
